name: Package WordPress Theme

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label, for example v0.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check:js

      - name: Build theme assets
        run: npm run build

      - name: Install PHP tooling
        run: composer install --no-interaction --prefer-dist

      - name: Check PHP coding standards
        run: composer run lint:php

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if (-not $version) {
            $version = '${{ github.ref_name }}'
          }
          if ($version -notmatch '^[vV]') {
            $version = "v$version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=Yneko-Reimu-$version.zip" >> $env:GITHUB_OUTPUT

      - name: Package theme
        shell: pwsh
        run: ./tools/package-theme.ps1 -OutputName '${{ steps.version.outputs.zip_name }}'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.version.outputs.zip_name }}
          path: releases/${{ steps.version.outputs.zip_name }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ZIP_PATH: releases/${{ steps.version.outputs.zip_name }}
        run: |
          NOTES_PATH="docs/release-notes-$TAG_NAME.md"
          if [ -f "$NOTES_PATH" ]; then
            cp "$NOTES_PATH" release-notes.md
          else
            gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="$TAG_NAME" \
              --jq .body > release-notes.md
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --title "$TAG_NAME" --notes-file release-notes.md
            gh release upload "$TAG_NAME" "$ZIP_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ZIP_PATH" --title "$TAG_NAME" --notes-file release-notes.md
          fi
